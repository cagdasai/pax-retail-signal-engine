<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>PAX Signal Panel</title>
<style>
body{font-family:Arial;background:#111;color:white;padding:20px}
.card{background:#222;padding:15px;border-radius:10px;margin-bottom:15px}
input,select{padding:8px;margin:5px;width:200px}
button{padding:8px;margin:5px;cursor:pointer}
</style>
</head>
<body>

<h1>PAX Signal Engine</h1>

<div class="card">
<h3>Müşteriler</h3>
<input id="name"><select id="sector">
<option>Hazır Giyim</option>
<option>Ev & Yaşam / Yapı Market</option>
<option>FMCG Dağıtım Kanalları</option>
<option>Gıda Perakendesi</option>
<option>Elektronik & Beyaz Eşya</option>
<option>Lojistik & Kargo</option>
<option>Yeme-İçme</option>
</select>
<button onclick="add()">Ekle</button>

<ul id="list"></ul>
</div>

<button onclick="generate()">JSON Oluştur</button>

<textarea id="out" style="width:100%;height:300px"></textarea>

<script>
let data = [];

function add(){
  const name = document.getElementById("name").value;
  const sector = document.getElementById("sector").value;

  if(!name) return;

  data.push({isim:name,sektor:sector});
  render();
}

function render(){
  const ul = document.getElementById("list");
  ul.innerHTML="";
  data.forEach((d,i)=>{
    const li=document.createElement("li");
    li.innerHTML = d.isim + " - " + d.sektor + 
    " <button onclick='del("+i+")'>X</button>";
    ul.appendChild(li);
  });
}

function del(i){
  data.splice(i,1);
  render();
}

function generate(){
  document.getElementById("out").value = JSON.stringify({
    "Müşteriler": data
  },null,2);
}
</script>

</body>
</html>
