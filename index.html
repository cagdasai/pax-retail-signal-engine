<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>PAX Signal Admin</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px}
.card{background:#1e293b;padding:15px;border-radius:12px;margin-bottom:20px}
input,select{padding:8px;margin:5px}
button{padding:8px;margin:5px;cursor:pointer}
ul{list-style:none;padding:0}
li{margin:5px 0;background:#334155;padding:6px;border-radius:6px}
</style>
</head>
<body>

<h1>PAX Signal Admin Panel</h1>

<div class="card">
<h2>Firma Ekle</h2>
<input id="fname" placeholder="Firma">
<select id="fsector">
<option>Hazır Giyim</option>
<option>Ev & Yaşam / Yapı Market</option>
<option>FMCG Dağıtım Kanalları</option>
<option>Gıda Perakendesi</option>
<option>Elektronik & Beyaz Eşya</option>
<option>Lojistik & Kargo</option>
<option>Yeme-İçme</option>
</select>
<button onclick="addFirma()">Ekle</button>

<ul id="firmaList"></ul>
</div>

<div class="card">
<h2>Kaynak Site Ekle</h2>
<input id="sname" placeholder="Site adı">
<input id="srss" placeholder="RSS URL">
<input id="sweb" placeholder="Web URL">
<button onclick="addSource()">Ekle</button>

<ul id="sourceList"></ul>
</div>

<button onclick="exportJSON()">JSON Oluştur</button>

<textarea id="out" style="width:100%;height:300px"></textarea>

<script>
let firmalar=[];
let kaynaklar=[];

function addFirma(){
let isim=document.getElementById("fname").value;
let sektor=document.getElementById("fsector").value;
if(!isim) return;
firmalar.push({isim,sektor});
render();
}

function addSource(){
let isim=document.getElementById("sname").value;
let rss=document.getElementById("srss").value;
let web=document.getElementById("sweb").value;
if(!isim) return;
kaynaklar.push({isim,rss,web});
render();
}

function render(){
let fList=document.getElementById("firmaList");
fList.innerHTML="";
firmalar.forEach((f,i)=>{
fList.innerHTML+=`<li>${f.isim} - ${f.sektor} <button onclick="delF(${i})">X</button></li>`;
});

let sList=document.getElementById("sourceList");
sList.innerHTML="";
kaynaklar.forEach((s,i)=>{
sList.innerHTML+=`<li>${s.isim} <button onclick="delS(${i})">X</button></li>`;
});
}

function delF(i){firmalar.splice(i,1);render();}
function delS(i){kaynaklar.splice(i,1);render();}

function exportJSON(){
document.getElementById("out").value=JSON.stringify({
takip_listesi:{Müşteriler:firmalar},
kaynak_listesi:kaynaklar
},null,2);
}
</script>

</body>
</html>
