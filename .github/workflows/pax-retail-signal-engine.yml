name: PAX Retail Signal Engine

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  tara:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Repo'yu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Script çalıştır
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python tara.py

      - name: JSON güncelle
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add gorulen_haberler.json || true
          git commit -m "update seen news" || true
          git push || true
